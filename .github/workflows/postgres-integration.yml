name: PostgreSQL integration

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: alpacaly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d alpacaly_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: server
    env:
      POSTGRES_TEST_URL: postgres://postgres:postgres@127.0.0.1:5432/alpacaly_test
      POSTGRES_TEST_SSL_MODE: disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Verify PostgreSQL native backup and restore tools
        run: |
          pg_dump --version
          pg_restore --version
      - name: Run full suite, PostgreSQL integration and disposable restore drill
        run: npm test
